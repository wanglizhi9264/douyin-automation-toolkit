<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>抖音工具</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="title-row">
        <h1>抖音收藏与下载</h1>
        <span id="runtimeStatus" class="status">加载中</span>
      </div>
      <div id="pageMeta" class="meta" style="margin-top:8px">等待抖音页面连接</div>
    </header>
    <section class="content">
      <div class="panel">
        <div class="buttons">
          <button id="profileBtn" class="button">检测登录</button>
          <button id="importBtn" class="button">导入进度</button>
          <button id="favoriteBtn" class="button primary">继续收藏</button>
          <button id="stopBtn" class="button" disabled>停止</button>
          <button id="auditBtn" class="button">审计最近</button>
          <button id="downloadBtn" class="button">开始下载</button>
        </div>
        <input id="importFile" type="file" accept="application/json,.json" hidden />
      </div>

      <div class="panel">
        <h2>进度</h2>
        <div class="grid">
          <div class="stat"><div class="stat-label">总数</div><div id="totalCount" class="stat-value">0</div></div>
          <div class="stat"><div class="stat-label">成功</div><div id="successCount" class="stat-value">0</div></div>
          <div class="stat"><div class="stat-label">待处理</div><div id="pendingCount" class="stat-value">0</div></div>
          <div class="stat"><div class="stat-label">暂停</div><div id="pausedCount" class="stat-value">0</div></div>
        </div>
      </div>

      <div class="panel">
        <h2>配置</h2>
        <div class="grid">
          <label class="field">每批数量<input id="batchSize" type="number" min="1" value="100" /></label>
          <label class="field">审计数量<input id="auditRecent" type="number" min="0" value="120" /></label>
          <label class="field">最小间隔<input id="minDelayMs" type="number" min="0" value="300" /></label>
          <label class="field">最大间隔<input id="maxDelayMs" type="number" min="0" value="900" /></label>
        </div>
        <label class="checkline"><input id="syncLikedBeforeRun" type="checkbox" />运行前刷新喜欢列表</label>
        <label class="checkline"><input id="downloadCovers" type="checkbox" checked />下载封面</label>
      </div>

      <div class="panel">
        <h2>当前</h2>
        <div id="cursorBox" class="meta">尚无数据</div>
      </div>

      <div class="panel">
        <h2>日志</h2>
        <div id="log" class="log"></div>
      </div>
    </section>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
